<!-- @dsCard group="Colors" viewport="700x150" name="Neutral · Slate" subtitle="Kühle Grautöne für Text, Flächen & Ränder" -->
<!DOCTYPE html>
<html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px; background:var(--surface); }
  .row { display:flex; gap:0; border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow-sm); border:1px solid var(--border); }
  .sw { flex:1; height:96px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; }
  .sw span { font-family:var(--font-mono); font-size:9.5px; }
  .sw .n { font-weight:700; }
  .dark-on { color:#fff; } .light-on { color:var(--gray-900); }
  .tag { display:inline-block; margin-top:6px; font-family:var(--font-mono); font-size:10px; color:var(--text-muted); }
</style></head>
<body>
  <div class="row">
    <div class="sw light-on" style="background:var(--gray-0)"><span class="n">0</span><span>#FFFFFF</span></div>
    <div class="sw light-on" style="background:var(--gray-50)"><span class="n">50</span><span>#F7F9FC</span></div>
    <div class="sw light-on" style="background:var(--gray-100)"><span class="n">100</span><span>#EEF1F6</span></div>
    <div class="sw light-on" style="background:var(--gray-200)"><span class="n">200</span><span>#E1E6EE</span></div>
    <div class="sw light-on" style="background:var(--gray-300)"><span class="n">300</span><span>#CBD3DF</span></div>
    <div class="sw light-on" style="background:var(--gray-400)"><span class="n">400</span><span>#9AA6B8</span></div>
    <div class="sw dark-on" style="background:var(--gray-500)"><span class="n">500</span><span>#6B7789</span></div>
    <div class="sw dark-on" style="background:var(--gray-600)"><span class="n">600</span><span>#4D5868</span></div>
    <div class="sw dark-on" style="background:var(--gray-700)"><span class="n">700</span><span>#38414E</span></div>
    <div class="sw dark-on" style="background:var(--gray-800)"><span class="n">800</span><span>#232A34</span></div>
    <div class="sw dark-on" style="background:var(--gray-900)"><span class="n">900</span><span>#141922</span></div>
    <div class="sw dark-on" style="background:var(--gray-950)"><span class="n">950</span><span>#0B0E14</span></div>
  </div>
  <span class="tag">--text 900 · --text-muted 500 · --border 200 · --bg 50</span>
</body></html>
