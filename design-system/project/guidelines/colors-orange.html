<!-- @dsCard group="Colors" viewport="700x150" name="Accent · Orange" subtitle="Energie, Sport, Bewegung — sekundäre CTA" -->
<!DOCTYPE html>
<html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px; background:var(--surface); }
  .row { display:flex; gap:0; border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow-sm); }
  .sw { flex:1; height:96px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; }
  .sw span { font-family:var(--font-mono); font-size:10px; }
  .sw .n { font-weight:700; }
  .dark-on { color:#fff; } .light-on { color:var(--orange-900); }
  .tag { display:inline-block; margin-top:6px; font-family:var(--font-mono); font-size:10px; color:var(--text-muted); }
</style></head>
<body>
  <div class="row">
    <div class="sw light-on" style="background:var(--orange-50)"><span class="n">50</span><span>#FFF1EB</span></div>
    <div class="sw light-on" style="background:var(--orange-100)"><span class="n">100</span><span>#FFDDCD</span></div>
    <div class="sw light-on" style="background:var(--orange-200)"><span class="n">200</span><span>#FFBE9F</span></div>
    <div class="sw light-on" style="background:var(--orange-300)"><span class="n">300</span><span>#FF9E70</span></div>
    <div class="sw light-on" style="background:var(--orange-400)"><span class="n">400</span><span>#FF8252</span></div>
    <div class="sw dark-on" style="background:var(--orange-500); outline:2px solid var(--navy-700); outline-offset:-2px"><span class="n">500 ★</span><span>#FF6B35</span></div>
    <div class="sw dark-on" style="background:var(--orange-600)"><span class="n">600</span><span>#ED5320</span></div>
    <div class="sw dark-on" style="background:var(--orange-700)"><span class="n">700</span><span>#C53F12</span></div>
    <div class="sw dark-on" style="background:var(--orange-800)"><span class="n">800</span><span>#9B3210</span></div>
    <div class="sw dark-on" style="background:var(--orange-900)"><span class="n">900</span><span>#6E240C</span></div>
  </div>
  <span class="tag">★ --energy · orange-500 · Highlights, sportliche CTAs, sparsam einsetzen</span>
</body></html>
