<!-- @dsCard group="Colors" viewport="700x150" name="Primary · Navy" subtitle="Vertrauen, Seriosität — Primärfarbe ist navy-600" -->
<!DOCTYPE html>
<html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px; background:var(--surface); }
  .row { display:flex; gap:0; border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow-sm); }
  .sw { flex:1; height:96px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; }
  .sw span { font-family:var(--font-mono); font-size:10px; }
  .sw .n { font-weight:700; }
  .dark-on { color:#fff; } .light-on { color:var(--navy-900); }
  .tag { display:inline-block; margin-top:6px; font-family:var(--font-mono); font-size:10px; color:var(--text-muted); }
  .star { position:absolute; }
</style></head>
<body>
  <div class="row">
    <div class="sw light-on" style="background:var(--navy-50)"><span class="n">50</span><span>#EEF2F8</span></div>
    <div class="sw light-on" style="background:var(--navy-100)"><span class="n">100</span><span>#D9E2F0</span></div>
    <div class="sw light-on" style="background:var(--navy-200)"><span class="n">200</span><span>#B3C4DF</span></div>
    <div class="sw light-on" style="background:var(--navy-300)"><span class="n">300</span><span>#7F9AC4</span></div>
    <div class="sw dark-on" style="background:var(--navy-400)"><span class="n">400</span><span>#4E6FA3</span></div>
    <div class="sw dark-on" style="background:var(--navy-500)"><span class="n">500</span><span>#2E4F84</span></div>
    <div class="sw dark-on" style="background:var(--navy-600); outline:2px solid var(--orange-500); outline-offset:-2px"><span class="n">600 ★</span><span>#1B3A6B</span></div>
    <div class="sw dark-on" style="background:var(--navy-700)"><span class="n">700</span><span>#163057</span></div>
    <div class="sw dark-on" style="background:var(--navy-800)"><span class="n">800</span><span>#112444</span></div>
    <div class="sw dark-on" style="background:var(--navy-900)"><span class="n">900</span><span>#0C1A33</span></div>
  </div>
  <span class="tag">★ --primary · navy-600 · Buttons, Header, Markenflächen</span>
</body></html>
