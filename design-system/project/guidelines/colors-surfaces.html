<!DOCTYPE html>
<html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:18px; background:var(--gray-100); display:flex; gap:16px; font-family:var(--font-body); }
  .pane { flex:1; border-radius:var(--radius-lg); padding:16px; box-shadow:var(--shadow-md); }
  .pane h4 { font-size:11px; text-transform:uppercase; letter-spacing:var(--ls-wider); color:var(--text-muted); margin:0 0 12px; }
  .stack { display:flex; flex-direction:column; gap:8px; }
  .layer { display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:var(--radius-md); border:1px solid var(--border); font-size:12px; color:var(--text); }
  .layer .v { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); }
</style></head>
<body>
  <div class="pane" style="background:var(--surface)">
    <h4>Light</h4>
    <div class="stack">
      <div class="layer" style="background:var(--bg)">bg <span class="v">--bg</span></div>
      <div class="layer" style="background:var(--surface)">surface <span class="v">--surface</span></div>
      <div class="layer" style="background:var(--surface-2)">surface-2 <span class="v">--surface-2</span></div>
    </div>
  </div>
  <div class="pane dark" data-theme="dark" style="background:var(--surface)">
    <h4>Dark</h4>
    <div class="stack">
      <div class="layer" style="background:var(--bg)">bg <span class="v">--bg</span></div>
      <div class="layer" style="background:var(--surface)">surface <span class="v">--surface</span></div>
      <div class="layer" style="background:var(--surface-2)">surface-2 <span class="v">--surface-2</span></div>
    </div>
  </div>
</body></html>
