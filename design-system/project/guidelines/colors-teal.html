<!-- @dsCard group="Colors" viewport="700x150" name="Accent · Teal" subtitle="Deals, Wachstum, Geld & Erfolg — accent / verified" -->
<!DOCTYPE html>
<html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px; background:var(--surface); }
  .row { display:flex; gap:0; border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow-sm); }
  .sw { flex:1; height:96px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; }
  .sw span { font-family:var(--font-mono); font-size:10px; }
  .sw .n { font-weight:700; }
  .dark-on { color:#fff; } .light-on { color:var(--teal-900); }
  .tag { display:inline-block; margin-top:6px; font-family:var(--font-mono); font-size:10px; color:var(--text-muted); }
</style></head>
<body>
  <div class="row">
    <div class="sw light-on" style="background:var(--teal-50)"><span class="n">50</span><span>#E6F8F2</span></div>
    <div class="sw light-on" style="background:var(--teal-100)"><span class="n">100</span><span>#C5F0E2</span></div>
    <div class="sw light-on" style="background:var(--teal-200)"><span class="n">200</span><span>#8FE3C8</span></div>
    <div class="sw light-on" style="background:var(--teal-300)"><span class="n">300</span><span>#54D2AC</span></div>
    <div class="sw light-on" style="background:var(--teal-400)"><span class="n">400</span><span>#25BE92</span></div>
    <div class="sw dark-on" style="background:var(--teal-500); outline:2px solid var(--navy-700); outline-offset:-2px"><span class="n">500 ★</span><span>#16B486</span></div>
    <div class="sw dark-on" style="background:var(--teal-600)"><span class="n">600</span><span>#0E9A72</span></div>
    <div class="sw dark-on" style="background:var(--teal-700)"><span class="n">700</span><span>#0B7A5B</span></div>
    <div class="sw dark-on" style="background:var(--teal-800)"><span class="n">800</span><span>#095E47</span></div>
    <div class="sw dark-on" style="background:var(--teal-900)"><span class="n">900</span><span>#064333</span></div>
  </div>
  <span class="tag">★ --accent · teal-500 · Verifiziert-Badge, Erfolg, sichere Zahlung</span>
</body></html>
