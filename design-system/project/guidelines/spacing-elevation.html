<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation" subtitle="Sanfte, navy-getönte Schatten — xs bis xl" -->
<!DOCTYPE html>
<html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:28px 24px; background:var(--surface-2); display:flex; gap:24px; align-items:center; flex-wrap:wrap; }
  .col { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .box { width:84px; height:64px; background:var(--surface); border-radius:var(--radius-lg); }
  .t { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); }
</style></head>
<body>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="t">xs</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="t">sm</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="t">md</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="t">lg</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="t">xl</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-brand); background:var(--navy-600)"></div><span class="t">brand</span></div>
</body></html>
