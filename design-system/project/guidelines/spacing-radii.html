<!DOCTYPE html>
<html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:24px; background:var(--surface); display:flex; gap:18px; align-items:center; flex-wrap:wrap; }
  .col { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { width:64px; height:64px; background:var(--navy-50); border:2px solid var(--navy-600); }
  .t { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); }
</style></head>
<body>
  <div class="col"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="t">xs · 4</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="t">sm · 6</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><span class="t">md · 10</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="t">lg · 14</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="t">xl · 20</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-2xl)"></div><span class="t">2xl · 28</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-pill)"></div><span class="t">pill</span></div>
</body></html>
