<!DOCTYPE html>
<html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:24px; background:var(--surface); display:flex; flex-direction:column; gap:14px; }
  .line { display:flex; align-items:baseline; gap:16px; }
  .line .t { font-family:var(--font-display); font-weight:800; color:var(--text); letter-spacing:-0.015em; }
  .line .m { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); }
  .h1 { font-size:36px; } .h2 { font-size:28px; } .h3 { font-size:22px; } .h4 { font-size:18px; }
</style></head>
<body>
  <div class="line"><span class="t h1">Finde deinen Match</span><span class="m">H1 · 36 / 800</span></div>
  <div class="line"><span class="t h2">Wie SponsorMatch funktioniert</span><span class="m">H2 · 28 / 800</span></div>
  <div class="line"><span class="t h3">Mediakit & Reichweite</span><span class="m">H3 · 22 / 800</span></div>
  <div class="line"><span class="t h4">Bisherige Sponsoren</span><span class="m">H4 · 18 / 800</span></div>
</body></html>
