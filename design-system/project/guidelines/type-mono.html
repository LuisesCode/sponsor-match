<!-- @dsCard group="Type" viewport="700x150" name="Mono · Kennzahlen" subtitle="JetBrains Mono für Beträge, Reichweite & Codes" -->
<!DOCTYPE html>
<html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:24px; background:var(--surface); display:flex; gap:32px; align-items:center; flex-wrap:wrap; }
  .stat { display:flex; flex-direction:column; }
  .stat .v { font-family:var(--font-mono); font-weight:700; font-size:30px; color:var(--text); letter-spacing:-0.02em; }
  .stat .v .u { color:var(--accent); }
  .stat .l { font-family:var(--font-body); font-size:13px; color:var(--text-muted); font-weight:600; }
  .m { font-family:var(--font-mono); font-size:10px; color:var(--text-subtle); }
</style></head>
<body>
  <div class="stat"><span class="v">128<span class="u">K</span></span><span class="l">Reichweite</span></div>
  <div class="stat"><span class="v">€4.250</span><span class="l">Deal-Wert</span></div>
  <div class="stat"><span class="v">4,9<span class="u">★</span></span><span class="l">Bewertung</span></div>
  <div class="stat"><span class="v">7,2<span class="u">%</span></span><span class="l">Engagement</span></div>
  <div class="m">--font-mono · tabular figures</div>
</body></html>
